services:
  scheduler:
    build:
      context: .
      dockerfile: Dockerfile
    image: ai-stock-scheduler:latest
    container_name: ai-stock-scheduler
    restart: always
    mem_limit: 2g
    env_file:
      - .env
    environment:
      TZ: Asia/Shanghai
    volumes:
      - ./logs:/srv/app/logs
    ports:
      - "8001:8001"
